# Build settings
include: ["_pages"]
exclude: ["README.md"]
exclude: [vendor]

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: pages
    values:
      layout: archive
      classes: wide
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false

atom_feed:
  hide: true
